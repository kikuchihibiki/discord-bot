name: Deploy Discord Bot

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_SSH_KEY }}" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key

      - name: Add host to known_hosts
        run: |
          ssh-keyscan -H "${{ secrets.OCI_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload app files
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.venv' \
            --exclude '.env' \
            -e "ssh -i ~/.ssh/oci_key -p ${{ secrets.OCI_PORT }}" \
            ./ "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:/opt/discord_pitchbot/"

      - name: Install dependencies and restart service
        run: |
          ssh -i ~/.ssh/oci_key -p "${{ secrets.OCI_PORT }}" "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" << 'EOF'
            cd /opt/discord_pitchbot
            python3 -m venv .venv
            source .venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            sudo systemctl restart discord-bot
            sudo systemctl status discord-bot --no-pager
          EOF
